<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Crime City</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="Pixel city game world"></canvas>

    <div id="joinOverlay" class="overlay">
      <div class="panel" id="joinPanel">
        <section id="stepName" class="step active" aria-label="Step 1: enter name">
          <h2>1. Enter Name</h2>
          <label for="nameInput">Player Name</label>
          <input id="nameInput" maxlength="16" placeholder="Street name" autocomplete="nickname" list="profileNameList" />
          <datalist id="profileNameList"></datalist>
          <div id="profileHint" class="profile-hint"></div>
          <div id="profileList" class="profile-list"></div>
          <button id="toColorBtn">Continue</button>
        </section>

        <section id="stepColor" class="step" aria-label="Step 2: choose color">
          <h2>2. Choose Pixel Color</h2>
          <div id="colorGrid" class="color-grid" role="radiogroup" aria-label="Color choices"></div>
          <div class="custom-color-row">
            <label for="customColor">Custom</label>
            <input id="customColor" type="color" value="#58d2ff" />
          </div>
          <div class="buttons-row">
            <button id="backBtn" class="secondary">Back</button>
            <button id="joinBtn">Join Shared World</button>
          </div>
        </section>

        <p id="joinError" class="error" role="alert"></p>
      </div>
    </div>

    <div id="hud" class="hud hidden" aria-live="polite">
      <div class="hud-row">
        <span id="hudName"></span>
        <span id="hudHealth"></span>
      </div>
      <div class="hud-row">
        <span id="hudMode"></span>
        <span id="hudMoney"></span>
      </div>
      <div class="hud-row">
        <span id="hudWanted"></span>
        <span id="hudOnline"></span>
      </div>
      <div class="hud-row hud-world-stats-row">
        <span id="hudWorldStats"></span>
      </div>
      <div class="hud-help">WASD move | Mouse aim | Click shoot | 1/2/3/4 switch weapon | E enter/exit/shop | Space horn | M map | O settings</div>
    </div>

    <div id="chatBar" class="chat-bar hidden" aria-live="polite">
      <input id="chatInput" type="text" maxlength="90" placeholder="Say something..." autocomplete="off" />
      <button id="chatSendBtn" type="button">Send</button>
    </div>

    <div id="settingsOverlay" class="settings-overlay hidden" aria-hidden="true">
      <div class="settings-panel" id="settingsPanel">
        <h2>Audio Settings</h2>
        <label class="settings-row" for="settingsMusicVol">
          <span>Music</span>
          <input id="settingsMusicVol" type="range" min="0" max="100" step="1" value="65" />
          <span id="settingsMusicVolValue">65%</span>
        </label>
        <label class="settings-row" for="settingsSfxVol">
          <span>SFX</span>
          <input id="settingsSfxVol" type="range" min="0" max="100" step="1" value="80" />
          <span id="settingsSfxVolValue">80%</span>
        </label>
        <label class="settings-row" for="settingsSirenVol">
          <span>Siren</span>
          <input id="settingsSirenVol" type="range" min="0" max="100" step="1" value="60" />
          <span id="settingsSirenVolValue">60%</span>
        </label>
        <div class="settings-buttons">
          <button id="settingsCancelBtn" class="secondary" type="button">Cancel</button>
          <button id="settingsSaveBtn" type="button">Save</button>
        </div>
      </div>
    </div>

    <div id="mobileRotateOverlay" class="mobile-rotate-overlay hidden" aria-hidden="true">
      <div class="mobile-rotate-card">
        <div class="mobile-rotate-title">Turn Phone Sideways</div>
        <div class="mobile-rotate-subtitle">Landscape mode is required to play.</div>
      </div>
    </div>

    <div id="mobileControls" class="mobile-controls hidden" aria-hidden="true">
      <div id="mobileStickBase" class="mobile-stick-base">
        <div id="mobileStickKnob" class="mobile-stick-knob"></div>
      </div>
      <div class="mobile-action-stack">
        <button id="mobileBtnE" type="button" aria-label="Enter or Exit">E</button>
        <button id="mobileBtnO" type="button" aria-label="Open Settings">O</button>
        <button id="mobileBtnMap" type="button" aria-label="Toggle Map">M</button>
        <button id="mobileBtnFullscreen" type="button" aria-label="Enter Fullscreen">FS</button>
      </div>
    </div>

    <script src="/client-protocol.js"></script>
    <script type="module" src="/client.js"></script>
  </body>
</html>
